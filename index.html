<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Mobtel — Fast &amp; Reliable Delivery Across Nigeria</title>
    <meta name="description" content="Same-day and next-day package delivery across 30+ cities in Nigeria. Book a shipment in minutes, track in real time. Fast. Reliable. Trackable." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#c32026" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mobtel" />
    <meta property="og:title" content="Mobtel — Fast &amp; Reliable Delivery Across Nigeria" />
    <meta property="og:description" content="Same-day and next-day package delivery across 30+ cities in Nigeria. Book a shipment in minutes, track in real time." />
    <meta property="og:url" content="https://mobtel.ng" />
    <meta property="og:image" content="https://images.pexels.com/videos/15978611/pexels-photo-15978611.jpeg?auto=compress&cs=tinysrgb&w=1200" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mobtel — Fast &amp; Reliable Delivery Across Nigeria" />
    <meta name="twitter:description" content="Same-day and next-day package delivery across 30+ cities in Nigeria. Book in minutes, track in real time." />
    <meta name="twitter:image" content="https://images.pexels.com/videos/15978611/pexels-photo-15978611.jpeg?auto=compress&cs=tinysrgb&w=1200" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Performance: preconnect to hero image CDN, then preload the hero image -->
    <link rel="preconnect" href="https://images.pexels.com" />
    <link
      rel="preload"
      as="image"
      href="https://images.pexels.com/videos/15978611/pexels-photo-15978611.jpeg?auto=compress&cs=tinysrgb&w=1920"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
